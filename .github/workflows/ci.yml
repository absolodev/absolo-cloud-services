# Absolo Cloud CI
#
# Plan reference: docs/plans/30-testing-ci-cd-d1e00e.md

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint TS
        run: pnpm exec turbo run lint
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Cargo fmt
        run: cargo fmt --all -- --check
      - name: Cargo clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Tofu fmt check
        uses: opentofu/setup-opentofu@v1
      - run: tofu fmt -check -recursive infra/tofu || true

  type-check:
    name: type-check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: TS Type Check
        run: pnpm exec turbo run typecheck
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cargo check
        run: cargo check --workspace --all-targets

  test-ts:
    name: test (typescript)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Test TS
        run: pnpm exec turbo run test

  test-rust:
    name: test (rust)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cargo test
        run: cargo test --workspace --all-features

  iac-validate:
    name: iac validate
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
      - name: Tofu Init & Validate
        run: |
          for dir in infra/tofu/*/ ; do
            if [ -d "$dir" ]; then
              echo "Validating $dir"
              (cd "$dir" && tofu init -backend=false && tofu validate)
            fi
          done

  helm-lint:
    name: helm lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Setup Helm
        uses: azure/setup-helm@v4
      - name: Helm lint
        run: |
          for chart in infra/helm/*/ ; do
            if [ -d "$chart" ] && [ -f "${chart}Chart.yaml" ]; then
              helm lint "$chart"
            fi
          done

  security-scan:
    name: security scan
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy vulnerability scanner on repo
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'table'
          severity: 'CRITICAL,HIGH'
