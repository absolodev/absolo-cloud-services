# Absolo Cloud CI — skeleton.
#
# Phase 0: this workflow is a placeholder. It defines the matrix of jobs we
# expect (lint, test, build, security scan, IaC validate, helm lint) but each
# step is currently a no-op. As source code lands, jobs will be filled in.
#
# Plan reference: docs/plans/30-testing-ci-cd-d1e00e.md

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-24.04
    steps:
