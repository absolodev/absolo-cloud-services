id: ghost
version: 5.80.0-absolo.1
name: Ghost
category: cms
description: 'A fast, modern open source publishing platform.'
runtime:
  pod:
    image: ghost:5.80.0-alpine
    ports: [2368]
    env_required:
      - database__client
      - database__connection__host
      - database__connection__user
      - database__connection__password
      - database__connection__database
    persistent_volume:
      mount: /var/lib/ghost/content
      default_size_gb: 5
      min_size_gb: 1
  managed_services:
    - kind: mysql
      name: ghost-db
      size_default: S
      bind_env_prefix: database__connection
sizes_allowed: [XS, S, M, L]
default_size: S
inputs:
  - key: url
    type: string
    required: true
upgrade_policy: snapshot_then_upgrade
backups: { interval: 24h, retain: 7 }
