# Local dev infrastructure for the Absolo monorepo.
#
# Services:
#   - postgres : Primary store for the control plane (CloudNativePG-equivalent
#                in production; bare Postgres 17 here).
#   - redis    : Cache + session store (used by control-plane in later phases).
#   - nats     : Event bus (used by orchestrator + saga runners).
#   - mailhog  : Catches outbound email so signup/reset flows are testable
#                without touching real SMTP. UI on http://localhost:8025.
#
# Bring up:
#   docker compose up -d
#
# Tail logs:
#   docker compose logs -f
#
# Wipe state:
#   docker compose down -v
#
# Health: every service declares a healthcheck; `docker compose ps` shows status.

services:
  postgres:
    image: postgres:17-alpine
    container_name: absolo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-absolo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-absolo}
      POSTGRES_DB: ${POSTGRES_DB:-absolo}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-absolo} -d ${POSTGRES_DB:-absolo}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: absolo-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  nats:
    image: nats:2.10-alpine
    container_name: absolo-nats
    restart: unless-stopped
    command: ["-js", "-m", "8222"]
    ports:
      - "${NATS_PORT:-4222}:4222"
      - "${NATS_MONITOR_PORT:-8222}:8222"
    volumes:
      - nats-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: absolo-mailhog
    restart: unless-stopped
    ports:
      - "${MAILHOG_SMTP_PORT:-1025}:1025" # SMTP
      - "${MAILHOG_UI_PORT:-8025}:8025"   # Web UI

volumes:
  postgres-data:
    name: absolo-postgres-data
  redis-data:
    name: absolo-redis-data
  nats-data:
    name: absolo-nats-data
